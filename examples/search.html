<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Web-Agent Search Demo</title>
		<style>
			:root {
				font-family:
					Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
					sans-serif;
				color: #172033;
				background: #f6f7fb;
			}

			body {
				margin: 0;
				min-height: 100vh;
			}

			main {
				max-width: 880px;
				margin: 0 auto;
				padding: 56px 24px;
			}

			h1 {
				margin: 0 0 20px;
				font-size: 32px;
				font-weight: 720;
				letter-spacing: 0;
			}

			.searchForm {
				display: grid;
				grid-template-columns: minmax(0, 1fr) auto;
				gap: 12px;
				margin-bottom: 28px;
			}

			input,
			button {
				font: inherit;
				border-radius: 8px;
			}

			input {
				min-width: 0;
				border: 1px solid #c8d0de;
				padding: 12px 14px;
				background: #fff;
			}

			button {
				border: 1px solid #155bd5;
				background: #2563eb;
				color: white;
				padding: 12px 18px;
				cursor: pointer;
			}

			.results {
				display: grid;
				gap: 12px;
			}

			.resultItem {
				border: 1px solid #d8deea;
				border-radius: 8px;
				background: #fff;
				padding: 16px;
			}

			.resultItem h2 {
				margin: 0 0 8px;
				font-size: 18px;
			}

			.resultItem p {
				margin: 0;
				color: #516079;
			}

			@media (max-width: 640px) {
				.searchForm {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<h1>课程项目搜索页</h1>

			<form class="searchForm" id="searchForm">
				<input
					id="searchInput"
					name="keyword"
					type="search"
					placeholder="请输入搜索关键词"
					aria-label="搜索关键词"
					autocomplete="off"
				/>
				<button id="searchButton" type="submit">搜索</button>
			</form>

			<section class="results" id="results" aria-live="polite">
				<div class="resultItem">
					<h2>等待搜索</h2>
					<p>提交搜索后，这里会显示包含关键词的结果。</p>
				</div>
			</section>
		</main>

		<script>
			const form = document.getElementById('searchForm')
			const input = document.getElementById('searchInput')
			const results = document.getElementById('results')

			form.addEventListener('submit', (event) => {
				event.preventDefault()
				const keyword = input.value.trim()
				results.innerHTML = ''

				if (!keyword) {
					results.innerHTML = `
						<div class="resultItem">
							<h2>请输入关键词</h2>
							<p>搜索内容不能为空。</p>
						</div>
					`
					return
				}

				results.innerHTML = `
					<div class="resultItem">
						<h2>${keyword} 的搜索结果</h2>
						<p>已找到与 ${keyword} 相关的课程项目示例结果。</p>
					</div>
					<div class="resultItem">
						<h2>Web-Agent 自动操作记录</h2>
						<p>搜索框输入完成，搜索按钮已点击，页面出现 ${keyword}。</p>
					</div>
				`
			})
		</script>
		<script src="/page-agent.demo.js?showPanel=true&lang=zh-CN"></script>
	</body>
</html>
